<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" width="640" height="260" role="img" aria-label="emprendHEC — Comunidad de Emprendedores">
  <title>emprendHEC — Comunidad de Emprendedores</title>
  <desc>Vector wordmark for EmprendHEC. Public-safe brand asset used as the reference organization in the Agent-First Enterprise Architecture Builder framework.</desc>

  <defs>
    <!-- Teal -> steel-blue gradient for "emprend" -->
    <linearGradient id="emprend-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a3b8"/>
      <stop offset="45%" stop-color="#3f7f97"/>
      <stop offset="100%" stop-color="#6f8ba0"/>
    </linearGradient>

    <!-- Orange -> amber gradient for "HEC" -->
    <linearGradient id="hec-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4801f"/>
      <stop offset="60%" stop-color="#fbb014"/>
      <stop offset="100%" stop-color="#ffc20e"/>
    </linearGradient>

    <!-- Soft disc behind the wordmark -->
    <radialGradient id="disc-grad" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#e8eef2"/>
      <stop offset="100%" stop-color="#cdd9e1"/>
    </radialGradient>
  </defs>

  <!-- Decorative disc -->
  <circle cx="118" cy="118" r="108" fill="url(#disc-grad)" opacity="0.55"/>

  <!-- Wordmark -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700">
    <text x="44" y="150" font-size="120" fill="url(#emprend-grad)" letter-spacing="-3">emprend</text>
    <text x="430" y="150" font-size="120" fill="url(#hec-grad)" letter-spacing="-2">HEC</text>
    <!-- Registered trademark mark -->
    <text x="612" y="92" font-size="22" fill="#6f8ba0" font-weight="600">M.R.</text>
  </g>

  <!-- Tagline -->
  <text x="160" y="200" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" letter-spacing="6" fill="#1a7a8a" font-weight="600">COMUNIDAD DE EMPRENDEDORES</text>

  <!-- Flowing connection motif with nodes -->
  <g fill="none" stroke="#9fb3c0" stroke-width="2">
    <path d="M150 230 C 250 205, 360 250, 470 235 S 600 220, 612 224"/>
    <path d="M150 230 C 260 248, 360 215, 470 240 S 600 235, 612 224" opacity="0.7"/>
  </g>
  <g fill="#f4801f">
    <circle cx="150" cy="230" r="5"/>
    <circle cx="255" cy="222" r="5"/>
    <circle cx="345" cy="234" r="5"/>
    <circle cx="470" cy="237" r="5"/>
    <circle cx="545" cy="228" r="5"/>
    <circle cx="612" cy="224" r="5"/>
  </g>
</svg>
